<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AniWatch Together</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="main-page">
    <section class="main-hero">
      <div class="main-card">
        <h1 class="main-title">🎌 AniWatch Together</h1>
        <p class="main-subtitle">Смотри аниме один или вместе с друзьями</p>

        <div class="main-form">
          <div class="form-group">
            <label for="username">Ваше имя</label>
            <input
              type="text"
              id="username"
              placeholder="Введите имя"
              maxlength="20"
            />
          </div>

          <div class="form-group">
            <label for="roomId">ID комнаты</label>
            <input
              type="text"
              id="roomId"
              placeholder="Введите ID комнаты"
            />
          </div>

          <div class="main-actions">
            <button id="joinRoomBtn" class="btn btn-primary">Войти в комнату</button>
            <button id="createRoomBtn" class="btn btn-secondary">Создать комнату</button>
            <button id="soloWatchBtn" class="btn btn-outline">Смотреть одному</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/main.js"></script>
</body>
</html>
