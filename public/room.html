<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Комната просмотра — Anivmeste</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/room.css" />
  <link rel="stylesheet" href="/room-mobile-fix.css" />
  <link rel="stylesheet" href="/overlay-patch.css" />
  <style>
    .hidden {
      display: none !important;
    }
  </style>
  <script>
    window.AnivmesteConfig = {
      support: {
        description: 'Поддержите развитие AniVmeste — это помогает нам делать сервис лучше!',
        thanksText: 'Спасибо, что вы с нами! ❤️',
        boostyUrl: 'https://boosty.to/anivmeste',
        donationAlertsUrl: 'https://www.donationalerts.com/r/anivmeste'
      }
    };
  </script>
</head>
<body>

<div class="room-page" id="roomPage">

  <header class="top-bar">
    <div class="top-bar-left">
      <a href="/" class="logo" style="text-decoration:none;color:inherit;">AniVmeste</a>
    </div>

    <div class="top-center">
      <span id="roomTitle">Комната просмотра</span>
      <button id="copyLinkBtn" class="small-btn" type="button" title="Скопировать ссылку-приглашение">🔗 Пригласить</button>
    </div>

    <div class="top-actions">
      <span id="hostBadge" class="host-badge">👀 Зритель</span>
      <button id="cinemaModeBtn" class="small-btn" type="button" title="Режим кинотеатра">🎬 Кино</button>
      <button id="supportRoomBtn" class="small-btn room-support-btn" type="button" title="Поддержать проект">❤️ Поддержать</button>
    </div>
  </header>

  <div class="room-layout-centered">

    <div class="player-area-centered">

      <div class="center-search-panel anime-search-section">
        <div class="center-search-head">
          <h2>🔍 Поиск аниме</h2>
          <span id="hostSearchHint" class="muted-text center-search-hint">Вы можете искать тайтлы и запускать плеер для всей комнаты</span>
        </div>
        <div class="center-search-box">
          <input
            id="searchInput"
            class="center-search-input"
            type="search"
            autocomplete="off"
            spellcheck="false"
            placeholder="Введите название аниме..."
          />
          <span class="center-search-icon">🔍</span>
          <div class="search-dropdown" id="animeList"></div>
        </div>
        <div class="center-search-status" id="searchStatus"></div>
      </div>

      <div class="selected-anime-panel" id="selectedAnimeInfo">
        <div class="empty-selected-anime">
          <p>Пока ничего не выбрано</p>
          <p class="small-note">Начните поиск аниме в поле выше.</p>
        </div>
      </div>

      <div class="player-shell player-shell-raised">
        <div class="player-wrapper player-wrapper-overlay" id="playerWrapper">

          <div class="player-top-overlay hidden" id="playerTopOverlay">
            <div class="player-overlay-controls">

              <div class="overlay-dropdown" id="overlayPlayerDropdown">
                <button class="overlay-control-btn" id="overlayPlayerBtn" type="button" title="Выбрать озвучку">
                  <span id="overlayPlayerBtnText">Озвучка</span>
                  <span class="overlay-control-arrow">▾</span>
                </button>
                <div class="overlay-dropdown-menu" id="overlayPlayerMenu"></div>
              </div>

              <div class="overlay-dropdown" id="overlayEpisodeDropdown">
                <button class="overlay-control-btn" id="overlayEpisodeBtn" type="button" title="Выбрать серию">
                  <span id="overlayEpisodeBtnText">Серия</span>
                  <span class="overlay-control-arrow">▾</span>
                </button>
                <div class="overlay-dropdown-menu-episodes" id="overlayEpisodeMenu"></div>
              </div>

            </div>
          </div>

        </div>
      </div>

    </div>

    <aside class="right-sidebar">

      <div class="chat-block block">
        <h2>💬 Чат</h2>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-box">
          <input
            id="chatInput"
            type="text"
            maxlength="300"
            placeholder="Сообщение..."
            autocomplete="off"
          />
          <button id="sendBtn" class="small-btn btn" type="button">Отправить</button>
        </div>
      </div>

      <div class="block">
        <div class="nickname-panel">
          <span class="nickname-label">Ваш ник</span>
          <div class="nickname-row">
            <input
              id="nicknameInput"
              class="nickname-input"
              type="text"
              maxlength="30"
              placeholder="Ваш ник..."
              autocomplete="off"
            />
            <button id="saveNicknameBtn" class="small-btn nickname-save-btn" type="button">Сохранить</button>
          </div>
        </div>
      </div>

      <div class="block">
        <h2>👥 Зрители</h2>
        <p class="users-caption muted-text">Участники комнаты и их прогресс</p>
        <div id="usersList" class="users-list">
          <div class="empty-state">Пока никого нет</div>
        </div>
      </div>

    </aside>

  </div>

</div>

<div
  id="roomSupportModal"
  class="hidden"
  aria-modal="true"
  aria-hidden="true"
  role="dialog"
  style="
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  "
>
  <div
    id="roomSupportModalBackdrop"
    style="
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
    "
  ></div>

  <div style="
    position: relative; z-index: 1;
    background: linear-gradient(180deg, #1e2842 0%, #18213a 100%);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 32px 28px 28px;
    max-width: 420px; width: 100%;
    box-shadow: 0 24px 56px rgba(0,0,0,0.48);
    text-align: center;
  ">
    <button
      id="closeRoomSupportModalBtn"
      type="button"
      style="
        position: absolute; top: 14px; right: 16px;
        background: none; border: none;
        color: #aebad6; font-size: 22px; cursor: pointer;
        line-height: 1; padding: 4px;
        transition: color .15s;
      "
      title="Закрыть"
    >✕</button>

    <div style="font-size: 40px; margin-bottom: 12px;">❤️</div>
    <h2 style="margin: 0 0 10px; font-size: 22px; font-weight: 800; color: #fff;">Поддержать проект</h2>
    <p id="roomSupportDescription" style="margin: 0 0 20px; color: #aebad6; font-size: 15px; line-height: 1.6;"></p>
    <p id="roomSupportThanks" style="margin: 0 0 22px; color: #9db4ff; font-size: 14px; font-weight: 600;"></p>

    <div style="display: flex; flex-direction: column; gap: 10px;">
      <a
        id="roomSupportBoostyLink"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        style="
          display: block; padding: 14px 20px;
          border-radius: 12px;
          background: linear-gradient(90deg, #f59e0b, #ef8c02);
          color: #fff; font-size: 16px; font-weight: 800;
          text-decoration: none;
          transition: filter .18s, transform .18s;
        "
        onmouseover="this.style.filter='brightness(1.08)';this.style.transform='translateY(-1px)'"
        onmouseout="this.style.filter='';this.style.transform=''"
      >☕ Boosty</a>

      <a
        id="roomSupportDonationAlertsLink"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        style="
          display: block; padding: 14px 20px;
          border-radius: 12px;
          background: linear-gradient(90deg, #ff4081, #e91e63);
          color: #fff; font-size: 16px; font-weight: 800;
          text-decoration: none;
          transition: filter .18s, transform .18s;
        "
        onmouseover="this.style.filter='brightness(1.08)';this.style.transform='translateY(-1px)'"
        onmouseout="this.style.filter='';this.style.transform=''"
      >🎁 DonationAlerts</a>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/chat.js"></script>
<script src="/player.js"></script>
<script src="/overlay-autohide.js"></script>
<script src="/room.js"></script>

</body>
</html>
